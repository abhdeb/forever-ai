<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forever AI — Sign In</title>
  <link rel="stylesheet" href="/static/css/wiki.css"/>
</head>
<body class="login-body">
  <div class="login-card">
    <div class="login-logo">🧠</div>
    <h1 class="login-title">Forever AI</h1>
    <p class="login-tagline">Your AI Second Brain — remembers everything, forgets nothing.</p>

    <!-- Tab switcher -->
    <div class="auth-tabs">
      <button class="auth-tab {% if tab == 'login' or not tab %}active{% endif %}"
              onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab {% if tab == 'register' %}active{% endif %}"
              onclick="switchTab('register')">Create Account</button>
    </div>

    {% if error %}
      <div class="auth-error">{{ error }}</div>
    {% endif %}

    <!-- Sign In -->
    <form id="form-login" class="auth-form {% if tab == 'register' %}hidden{% endif %}"
          method="POST" action="/login">
      <div class="field">
        <label for="login-email">Email</label>
        <input id="login-email" type="email" name="email" required autocomplete="email"
               value="{{ email or '' }}" placeholder="you@example.com"/>
      </div>
      <div class="field">
        <label for="login-password">Password</label>
        <input id="login-password" type="password" name="password" required
               autocomplete="current-password" placeholder="••••••••"/>
      </div>
      <button type="submit" class="auth-submit-btn">Sign In</button>
    </form>

    {% if google %}
    <div class="auth-divider"><span>or</span></div>
    <a href="/auth/google" class="google-btn">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
      Continue with Google
    </a>
    {% endif %}

    <!-- Create Account -->
    <form id="form-register" class="auth-form {% if tab != 'register' %}hidden{% endif %}"
          method="POST" action="/register">
      <div class="field">
        <label for="reg-name">Your Name</label>
        <input id="reg-name" type="text" name="name" required autocomplete="name"
               value="{{ name or '' }}" placeholder="Ada Lovelace"/>
      </div>
      <div class="field">
        <label for="reg-email">Email</label>
        <input id="reg-email" type="email" name="email" required autocomplete="email"
               value="{{ email or '' }}" placeholder="you@example.com"/>
      </div>
      <div class="field">
        <label for="reg-password">Password <span class="hint">(min 8 characters)</span></label>
        <input id="reg-password" type="password" name="password" required
               autocomplete="new-password" placeholder="••••••••" minlength="8"/>
      </div>
      <div class="field">
        <label for="reg-confirm">Confirm Password</label>
        <input id="reg-confirm" type="password" name="confirm" required
               autocomplete="new-password" placeholder="••••••••"/>
      </div>
      <button type="submit" class="auth-submit-btn">Create Account</button>
    </form>

    <p class="login-footer">Your data is private and stored securely.</p>
  </div>

  <script>
    function switchTab(tab) {
      document.querySelectorAll('.auth-tab').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.auth-form').forEach(f => f.classList.add('hidden'));
      document.querySelector('#form-' + tab).classList.remove('hidden');
      event.target.classList.add('active');
    }
  </script>
</body>
</html>
