services:
  - type: web
    name: forever-ai
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 2 -b 0.0.0.0:$PORT wsgi:app --timeout 120
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false           # set in Render dashboard
      - key: GROQ_API_KEY
        sync: false           # set in Render dashboard
      - key: GOOGLE_CLIENT_ID
        sync: false           # optional — enables Google OAuth login
      - key: GOOGLE_CLIENT_SECRET
        sync: false           # optional — enables Google OAuth login
      - key: PYTHON_VERSION
        value: "3.9.18"
